<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>M.NhatStore</title>

<style>
body{
margin:0;
font-family:Arial;
background:#070b1a;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#0d1228;
position:sticky;
top:0;
}

.logo{
font-size:30px;
font-weight:bold;
color:#55dfff;
}

.btn{
background:linear-gradient(45deg,#00c6ff,#7d5fff);
padding:12px 25px;
border:none;
border-radius:15px;
color:white;
font-size:16px;
}

.hero{
padding:50px 20px;
text-align:center;
}

.hero h1{
font-size:45px;
margin-bottom:20px;
}

.hero p{
color:#ccc;
}

.card-area{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:30px;
}

.card{
background:#11182f;
border-radius:25px;
overflow:hidden;
box-shadow:0 0 20px rgba(128,0,255,0.3);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-content{
padding:20px;
}

.price{
font-size:28px;
color:#5ee7ff;
font-weight:bold;
}

.buy{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:15px;
background:linear-gradient(45deg,#00c6ff,#7d5fff);
color:white;
font-size:16px;
}

.footer{
text-align:center;
padding:40px;
color:#aaa;
}
</style>
</head>

<body>

<header>
<div class="logo">M.NhatStore</div>

<button class="btn">💸 Nạp Tiền</button>
</header>

<section class="hero">
<h1>Shop Acc & Cloud Phone</h1>

<p>Acc Blox Fruit • Cloud Phone • Script Premium</p>
</section>

<section class="card-area">

<div class="card">
<img src="https://images.unsplash.com/photo-1542751110-97427bbecf20?q=80&w=1200&auto=format&fit=crop">

<div class="card-content">
<h2>Acc Blox Fruit Max</h2>

<div class="price">299K</div>

<button class="buy">Mua Ngay</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1512941937669-90a1b58e7e9c?q=80&w=1200&auto=format&fit=crop">

<div class="card-content">
<h2>Cloud Phone VIP</h2>

<div class="price">99K</div>

<button class="buy">Thuê Ngay</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200&auto=format&fit=crop">

<div class="card-content">
<h2>Script Premium</h2>

<div class="price">49K</div>

<button class="buy">Mua Ngay</button>
</div>
</div>

</section>

<div class="footer">
© 2026 M.NhatStore
</div>

</body>
    </html>
